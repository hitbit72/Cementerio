<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cementerio - Jimena</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 p-6" x-data="cementerioApp()">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">📍 Visualizador de Sectores</h1>

        <div class="mb-4">
            <label class="block font-medium mb-1">Selecciona un Sector:</label>
            <select class="border p-2 rounded w-full md:w-64" 
                    x-model="selectedSector" 
                    @change="fetchNichos()">
                <option value="">-- Elige un sector --</option>
                <template x-for="sector in sectores" :key="sector.id">
                    <option :value="sector.id" x-text="sector.nombre"></option>
                </template>
            </select>
        </div>

        <div x-show="loading" class="text-blue-600 font-semibold my-4">Cargando datos...</div>

        <div class="grid gap-2 mt-6" 
             :style="`grid-template-columns: repeat(${currentSectorInfo.columnas || 1}, minmax(0, 1fr))`"
             x-show="nichos.length > 0">
            
            <template x-for="nicho in nichos" :key="nicho.id">
                <div class="p-4 rounded border text-center font-bold cursor-pointer transition-all"
                     :class="{
                        'bg-green-100 border-green-400 text-green-700': nicho.estado === 'Vacio',
                        'bg-red-100 border-red-400 text-red-700': nicho.estado === 'Ocupado',
                        'bg-gray-100 border-gray-400 text-gray-600': !nicho.estado || nicho.estado === ''
                     }"
                     @click="alert(`Nicho: ${nicho.numero_nicho} \nEstado: ${nicho.estado || 'No definido'}`)">
                    <span x-text="'N° ' + nicho.numero_nicho"></span>
                </div>
            </template>
        </div>
    </div>

    <script>
        // 1. Inicializar Supabase (Reemplaza con tus credenciales reales de Supabase)
        const SUPABASE_URL = "https://psdyzkgroclixhnfhxgj.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_9lrJEqUZecf82qxUv_31Hw_ZNQ-N97k";
        const supabase = SUPABASE.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Lógica de la aplicación con Alpine.js
        function cementerioApp() {
            return {
                sectores: [],
                nichos: [],
                selectedSector: '',
                currentSectorInfo: {},
                loading: false,

                // Código que se ejecuta automáticamente al iniciar la app
                async init() {
                    this.loading = true;
                    // Traemos los sectores ordenados
                    const { data, error } = await supabase
                        .from('public.sectores')
                        .select('*')
                        .order('orden', { ascending: true });

                    if (error) console.error("Error cargando sectores:", error);
                    else this.sectores = data;
                    this.loading = false;
                },

                // Traer los nichos del sector seleccionado
                async fetchNichos() {
                    if (!this.selectedSector) {
                        this.nichos = [];
                        this.currentSectorInfo = {};
                        return;
                    }

                    this.loading = true;
                    
                    // Guardamos la info del sector actual para las filas/columnas del CSS Grid
                    this.currentSectorInfo = this.sectores.find(s => s.id === this.selectedSector) || {};

                    // Buscamos los nichos asociados a ese sector
                    const { data, error } = await supabase
                        .from('public.nichos')
                        .select('*')
                        .eq('sector_id', this.selectedSector)
                        .order('numero_nicho', { ascending: true });

                    if (error) console.error("Error cargando nichos:", error);
                    else this.nichos = data;
                    
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
