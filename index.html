<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro del Cementerio · Ayuntamiento de Jimena</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script src="js/config.js"></script>
<script src="js/catalogos.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/difuntos.js"></script>
<script src="js/sectores.js"></script>
<script src="js/propietarios.js"></script>
<script src="js/recibos.js"></script>
<script src="js/usuarios.js"></script>
</head>
<body>

<div class="app-shell" x-data="appShell()" x-init="init()" x-cloak>

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" :class="{ open: sidebarOpen }">

    <div class="sidebar-brand">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2 L26 14 L22 14 L28 24 L23 24 L30 34 L10 34 L17 24 L12 24 L18 14 L14 14 Z" fill="currentColor"/>
        <rect x="18.5" y="34" width="3" height="4" fill="currentColor"/>
      </svg>
      <div>
        <div class="name">Registro del<br>Cementerio</div>
        <div class="place">Ayuntamiento de Jimena</div>
      </div>
    </div>

    <template x-for="section in visibleNavSections" :key="section.label">
      <div>
        <div class="nav-section-label" x-text="section.label"></div>
        <ul class="nav-list">
          <template x-for="item in section.items" :key="item.key">
            <li class="nav-item">
              <button class="nav-link" :class="{ active: activeSection === item.key }" @click="goTo(item.key)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                     stroke-linecap="round" stroke-linejoin="round"
                     x-html="NAV_ICONS[item.icon]"></svg>
                <span x-text="item.label"></span>
              </button>
            </li>
          </template>
        </ul>
      </div>
    </template>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" x-text="initials"></div>
        <div class="who">
          <div class="email" x-text="profile?.nombre || profile?.email"></div>
          <div class="role" x-text="profile?.role"></div>
        </div>
      </div>
      <button class="logout-link" @click="signOut()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <path d="M16 17l5-5-5-5"/>
          <path d="M21 12H9"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
    <div class="programer">
      <p>(c) hitbit72 2026</p>
    <div>
  </aside>

  <!-- backdrop móvil -->
  <div x-show="sidebarOpen" @click="sidebarOpen = false" x-cloak
       style="position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:30;"></div>

  <!-- ===================== MAIN ===================== -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="breadcrumb">Cementerio Municipal de Jimena</div>
        <h2 x-text="sectionTitle"></h2>
      </div>
      <button class="menu-toggle" @click="sidebarOpen = !sidebarOpen" aria-label="Abrir menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </header>

    <main class="content">

      <!-- ---------- Panel / Dashboard ---------- -->
      <template x-if="activeSection === 'dashboard'">
        <div>
          <div class="card-grid">
            <div class="stat-card">
              <div class="label">Difuntos registrados</div>
              <div class="value" :class="{ loading: statsLoading }" x-text="statsLoading ? '···' : stats.difuntos"></div>
            </div>
            <div class="stat-card">
              <div class="label">Nichos ocupados</div>
              <div class="value" :class="{ loading: statsLoading }" x-text="statsLoading ? '···' : stats.nichosOcupados"></div>
            </div>
            <div class="stat-card">
              <div class="label">Nichos vacíos</div>
              <div class="value" :class="{ loading: statsLoading }" x-text="statsLoading ? '···' : stats.nichosVacios"></div>
            </div>
            <div class="stat-card">
              <div class="label">Familiares</div>
              <div class="value" :class="{ loading: statsLoading }" x-text="statsLoading ? '···' : stats.propietarios"></div>
            </div>
            <div class="stat-card">
              <div class="label">Recibos pendientes</div>
              <div class="value" :class="{ loading: statsLoading }" x-text="statsLoading ? '···' : stats.recibosPendientes"></div>
            </div>
          </div>

          <!-- 
          <div class="panel">
            <h3>Bienvenido<span x-show="profile?.nombre">, <span x-text="profile.nombre"></span></span></h3>
            <p style="color:var(--color-ink-soft); margin:0;">
              Usa el menú lateral para consultar sectores, nichos, difuntos, propietarios y recibos.
              Tu rol actual es <strong x-text="profile?.role"></strong>.
            </p>
          </div>
          -->
          <div class="card-grid">
            <div class="panel">
              <img src="./img/plano.jpg">
            </div>
          </div>
        </div>
      </template>

      <!-- ---------- Difuntos ---------- -->
      <template x-if="activeSection === 'difuntos'">
        <div x-data="difuntosSection()" x-init="init()">

          <div class="toolbar">
            <input class="search-input" type="text" placeholder="Buscar por apellidos, nombre o nº de registro…"
                   x-model="search" @input="onSearchInput()">

            <select class="select-input" x-model="sectorFiltro" @change="onSectorFilterChange()">
              <option value="">Todos los sectores</option>
              <template x-for="s in sectores" :key="s.id">
                <option :value="s.id" x-text="s.nombre"></option>
              </template>
            </select>

            <button class="btn btn-primary" x-show="canWrite" @click="openCreate()">+ Nuevo difunto</button>
          </div>

          <table class="data-table">
            <thead>
              <tr>
                <th>Apellidos</th>
                <th>Nombre</th>
                <th>Nicho</th>
                <th>Fallecimiento</th>
                <th>Edad</th>
                <th>Observaciones</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="loading">
                <tr><td colspan="6" class="table-empty">Cargando…</td></tr>
              </template>
              <template x-if="!loading && rows.length === 0">
                <tr><td colspan="6" class="table-empty">No se han encontrado difuntos con esos filtros.</td></tr>
              </template>
              <template x-if="!loading">
                <template x-for="row in rows" :key="row.id">
                  <tr @click="openDetail(row)">
                    <td x-text="row.apellidos || '—'"></td>
                    <td x-text="row.nombre"></td>
                    <td x-text="ubicacion(row)"></td>
                    <td x-text="fmtDate(row.ffallecido)"></td>
                    <td x-text="row.edad ?? '—'"></td>
                    <td x-text="row.observaciones"></td>
                  </tr>
                </template>
              </template>
            </tbody>
          </table>

          <div class="pagination" x-show="!loading && totalCount > 0">
            <span>
              Página <span x-text="page + 1"></span> de <span x-text="totalPages"></span>
              (<span x-text="totalCount"></span> registros)
            </span>
            <div class="controls">
              <button class="btn btn-ghost btn-sm" @click="prevPage()" :disabled="page === 0">Anterior</button>
              <button class="btn btn-ghost btn-sm" @click="nextPage()" :disabled="page + 1 >= totalPages">Siguiente</button>
            </div>
          </div>

          <!-- ===================== DRAWER DE DETALLE / EDICIÓN ===================== -->
          <template x-if="drawerOpen">
            <div>
              <div class="drawer-backdrop" @click="closeDrawer()"></div>
              <div class="drawer">

                <div class="drawer-header">
                  <div>
                    <template x-if="drawerMode === 'create'"><h3>Nuevo difunto</h3></template>
                    <template x-if="drawerMode !== 'create'">
                      <h3 x-text="current ? (current.nombre + ' ' + (current.apellidos || '')) : 'Cargando…'"></h3>
                    </template>
                    <template x-if="drawerMode === 'edit'"><div class="muted" x-text="'Editando ficha: ' + ubicacion(current)"></div></template>
                  </div>
                  <button class="drawer-close" @click="closeDrawer()" aria-label="Cerrar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                  </button>
                </div>

                <div class="drawer-body">

                  <template x-if="formError">
                    <div class="error-banner" x-text="formError"></div>
                  </template>

                  <!-- ---------- MODO VISTA ---------- -->
                  <template x-if="drawerMode === 'view' && current">
                    <div>
                      <div class="def-list">
                        <div class="def-item"><div class="dt">Nº Registro</div><div class="dd" x-text="current.num_registro || '—'"></div></div>
                        <div class="def-item"><div class="dt">Edad</div><div class="dd" x-text="current.edad ?? '—'"></div></div>
                        <div class="def-item"><div class="dt">Fecha nacimiento</div><div class="dd" x-text="fmtDate(current.fnacido)"></div></div>
                        <div class="def-item"><div class="dt">Fecha fallecimiento</div><div class="dd" x-text="fmtDate(current.ffallecido)"></div></div>
                        <div class="def-item"><div class="dt">Causa</div><div class="dd" x-text="current.causa || '—'"></div></div>
                        <div class="def-item"><div class="dt">Nicho</div><div class="dd" x-text="ubicacion(current)"></div></div>
                        <div class="def-item"><div class="dt">Población</div><div class="dd" x-text="current.poblacion?.nombre || '—'"></div></div>
                        <div class="def-item"><div class="dt">Dirección</div><div class="dd" x-text="current.direccion || '—'"></div></div>
                      </div>
                      <div class="def-list full">
                        <div class="def-item"><div class="dt">Observaciones</div><div class="dd" x-text="current.observaciones || '—'"></div></div>
                        <div class="def-item">
                          <div class="dt">Última modificación</div>
                          <div class="dd muted" x-text="(current.musuario_profile?.nombre || current.musuario_profile?.email || 'Desconocido') + (current.fmodificado ? ' · ' + new Date(current.fmodificado).toLocaleString('es-ES') : '')"></div>
                        </div>
                      </div>

                      <hr class="section-divider">

                      <!-- ---------- Familiares ---------- -->
                      <h4 class="subsection-title">Familiares</h4>

                      <template x-if="familiaresLoading">
                        <p class="muted">Cargando familiares…</p>
                      </template>

                      <template x-if="!familiaresLoading && familiares.length === 0">
                        <p class="muted">No hay familiares registrados todavía.</p>
                      </template>

                      <template x-for="rel in familiares" :key="rel.id">
                      <div class="add-difunto-famili">
                        <div class="familiar-row">
                          <div>
                            <div class="familiar-name" x-text="(rel.propietario?.nombre || '') + ' ' + (rel.propietario?.apellidos || '')"></div>
                            <div class="familiar-meta" x-text="(rel.propietario?.telefono || 'Sin teléfono') + (rel.propietario?.dni ? ' · ' + rel.propietario.dni : '')"></div>
                          </div>
                          <div style="display:flex; align-items:center; gap:0.6em;">
                            <span class="tag" x-show="rel.relacion" x-text="rel.relacion"></span>
                            <button class="btn btn-ghost btn-sm" x-show="canWrite" @click="removeFamiliar(rel)">Quitar</button>
                          </div>
                        </div>
                      </div>
                      </template>

                      <template x-if="canWrite">
                        <div class="add-familiar-box">
                          <div class="field" style="position:relative; margin-bottom:0.6em;">
                            <label>Añadir familiar existente</label>
                            <input type="text" placeholder="Busca por nombre, apellidos o DNI…"
                                   x-model="famSearch" @input="onFamSearchInput()">
                            <div class="autocomplete-results" x-show="famResults.length > 0">
                              <template x-for="p in famResults" :key="p.id">
                                <button type="button" @click="pickFamiliar(p)" x-text="p.nombre + ' ' + (p.apellidos || '') + (p.dni ? ' · ' + p.dni : '')"></button>
                              </template>
                            </div>
                          </div>
                          <div class="field" style="margin-bottom:0.6em;">
                            <label class="relacion">RELACIÓN ( ej. Hijo/a, Nieto/a )</label>
                            <input type="text" x-model="famRelacion">
                          </div>
                          <button class="btn btn-primary btn-sm" :disabled="!famSelected || famSaving" @click="addFamiliar()">
                            <span x-show="!famSaving">Añadir</span>
                            <span x-show="famSaving">Añadiendo…</span>
                          </button>
                        </div>
                      </template>
                      <hr class="miniform-divider">
                    </div>
                  </template>

                  <!-- ---------- MODO CREAR / EDITAR ---------- -->
                  <template x-if="drawerMode === 'create' || drawerMode === 'edit'">
                    <div class="form-grid">
                      <div class="field"><label>Nº Registro</label><input type="text" x-model="form.num_registro"></div>
                      <div class="field"><label>Nombre *</label><input type="text" x-model="form.nombre" required></div>
                      <div class="field span-2"><label>Apellidos</label><input type="text" x-model="form.apellidos"></div>

                      <div class="field"><label>Fecha nacimiento</label><input type="date" x-model="form.fnacido"></div>
                      <div class="field"><label>Fecha fallecimiento</label><input type="date" x-model="form.ffallecido"></div>

                      <div class="field"><label>Edad</label><input type="number" min="0" step="1" x-model="form.edad"></div>

                      <div class="field span-2"><label>Causa</label><input type="text" x-model="form.causa"></div>
                      <div class="field"><label>Dirección</label><input type="text" x-model="form.direccion"></div>

                      <div class="field" style="position:relative;" @click.outside="poblacionDropdownOpen = false">
                        <label>Población</label>
                        <input type="text" placeholder="Escribe para buscar…"
                               x-model="poblacionInput" @input="onPoblacionInput()" @focus="onPoblacionInput()">
                        <div class="autocomplete-results" style="left:0; right:0;" x-show="poblacionDropdownOpen && poblacionMatches.length > 0">
                          <template x-for="p in poblacionMatches" :key="p.id">
                            <button type="button" @click="pickPoblacion(p)" x-text="p.nombre"></button>
                          </template>
                        </div>
                        <div class="muted" style="font-size:0.78rem; margin-top:0.35em;" x-show="poblacionEsNueva">
                          Se creará como población nueva: "<span x-text="poblacionInput.trim()"></span>"
                        </div>
                      </div>

                      <div class="field">
                        <label>Sector</label>
                        <select x-model="formSectorId" @change="onSectorChangeInForm()">
                          <option value="">— Sin asignar —</option>
                          <template x-for="s in sectores" :key="s.id">
                            <option :value="s.id" :selected="s.id === formSectorId" x-text="s.nombre"></option>
                          </template>
                        </select>
                      </div>
                      <div class="field" x-show="formSectorId">
                        <label>Nicho</label>
                        <select x-model="form.nicho_id">
                          <option value="">— Elegir nicho —</option>
                          <template x-for="n in nichoOptions" :key="n.id">
                            <option :value="n.id" :selected="n.id === form.nicho_id" x-text="'Nº ' + n.numero_nicho + (n.estado ? ' · ' + n.estado : '')"></option>
                          </template>
                        </select>
                      </div>

                      <div class="field span-2"><label>Observaciones</label><textarea x-model="form.observaciones"></textarea></div>
                    </div>
                  </template>

                </div>

                <div class="drawer-footer">
                  <template x-if="drawerMode === 'view'">
                    <template x-if="canWrite">
                      <button class="btn btn-danger" @click="deleteCurrent()">Eliminar</button>
                    </template>
                  </template>
                  <div class="spacer"></div>
                  <template x-if="drawerMode === 'view'">
                    <button class="btn btn-ghost" @click="closeDrawer()">Cerrar</button>
                  </template>
                  <template x-if="drawerMode === 'view' && canWrite">
                    <button class="btn btn-primary" @click="startEdit()">Editar</button>
                  </template>
                  <template x-if="drawerMode === 'create' || drawerMode === 'edit'">
                    <button class="btn btn-ghost" @click="cancelEdit()">Cancelar</button>
                  </template>
                  <template x-if="drawerMode === 'create' || drawerMode === 'edit'">
                    <button class="btn btn-primary" :disabled="saving" @click="saveForm()">
                      <span x-show="!saving">Guardar</span>
                      <span x-show="saving">Guardando…</span>
                    </button>
                  </template>
                </div>

              </div>
            </div>
          </template>

        </div>
      </template>

      <!-- ---------- Sectores ---------- -->
      <template x-if="activeSection === 'sectores'">
        <div x-data="sectoresSection()" x-init="init()">

          <div class="toolbar">
            <input class="search-input" type="text" placeholder="Buscar por nombre o situación…" x-model="search">
            <button class="btn btn-primary" x-show="canManageSector" @click="openCreate()">+ Nuevo sector</button>
          </div>

          <table class="data-table">
            <thead>
              <tr>
                <th>Sector</th>
                <th>Tipo</th>
                <th>Nichos</th>
                <th>Ocupados</th>
                <th>Vacíos</th>
                <th>Situación</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="loading">
                <tr><td colspan="6" class="table-empty">Cargando…</td></tr>
              </template>
              <template x-if="!loading && filteredSectors.length === 0">
                <tr><td colspan="6" class="table-empty">No se han encontrado sectores.</td></tr>
              </template>
              <template x-if="!loading">
                <template x-for="s in filteredSectors" :key="s.id">
                  <tr @click="openDetail(s)">
                    <td x-text="s.nombre"></td>
                    <td x-text="s.tipo"></td>
                    <td x-text="s.total_nichos"></td>
                    <td x-text="s.nichos_ocupados"></td>
                    <td x-text="s.nichos_vacios"></td>
                    <td x-text="s.situacion || '—'"></td>
                  </tr>
                </template>
              </template>
            </tbody>
          </table>

          <!-- ===================== DRAWER DE SECTOR ===================== -->
          <template x-if="drawerOpen">
            <div>
              <div class="drawer-backdrop" @click="closeDrawer()"></div>
              <div class="drawer">

                <div class="drawer-header">
                  <div>
                    <template x-if="drawerMode === 'create'"><h3>Nuevo sector</h3></template>
                    <template x-if="drawerMode !== 'create'">
                      <h3 x-text="current ? current.nombre : ''"></h3>
                    </template>
                    <template x-if="drawerMode === 'edit'"><div class="muted">Editando sector</div></template>
                  </div>
                  <button class="drawer-close" @click="closeDrawer()" aria-label="Cerrar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                  </button>
                </div>

                <div class="drawer-body">

                  <template x-if="formError">
                    <div class="error-banner" x-text="formError"></div>
                  </template>

                  <!-- ---------- MODO VISTA ---------- -->
                  <template x-if="drawerMode === 'view' && current">
                    <div>
                      <div class="def-list">
                        <div class="def-item"><div class="dt">Tipo</div><div class="dd" x-text="current.tipo"></div></div>
                        <div class="def-item"><div class="dt">Situación</div><div class="dd" x-text="current.situacion || '—'"></div></div>
                        <div class="def-item"><div class="dt">Filas × Columnas</div><div class="dd" x-text="(current.filas ?? 0) + ' × ' + (current.columnas ?? 0)"></div></div>
                        <div class="def-item"><div class="dt">Nº inicial</div><div class="dd" x-text="current.inicio ?? '—'"></div></div>
                      </div>
                      <div class="def-list full">
                        <div class="def-item"><div class="dt">Observaciones</div><div class="dd" x-text="current.observaciones || '—'"></div></div>
                      </div>

                      <!-- ---------- Disposición visual ---------- -->
                      <template x-if="dispositionGrid">
                        <div>
                          <h4 class="subsection-title">Disposición</h4>
                          <div style="overflow-x:auto;">
                            <table class="nicho-grid">
                              <template x-for="(row, ridx) in dispositionGrid" :key="ridx">
                                <tr>
                                  <template x-for="cell in row" :key="cell.numero">
                                    <td class="nicho-cell"
                                        :class="{
                                          'cell-ocupado': cell.estado === 'Ocupado',
                                          'cell-vacio': cell.estado === 'Vacio',
                                          'cell-reservado': cell.estado === 'Reservado',
                                          'cell-sincrear': !cell.nicho,
                                          'cell-clickable': cell.nicho && canWrite
                                        }"
                                        :title="'Nº ' + cell.numero + (cell.nicho ? (' · ' + (cell.estado || 'Sin estado')) : ' · sin crear')"
                                        @click="cell.nicho && canWrite && openNichoEdit(cell.nicho); $nextTick(() => $refs.numNicho.focus())"
                                        x-text="cell.numero">
                                    </td>
                                  </template>
                                </tr>
                              </template>
                            </table>
                          </div>
                          <div class="grid-legend">
                            <span><i class="dot dot-ocupado"></i> Ocupado</span>
                            <span><i class="dot dot-vacio"></i> Vacío</span>
                            <span><i class="dot dot-reservado"></i> Reservado</span>
                            <span><i class="dot dot-sincrear"></i> Sin crear</span>
                          </div>
                        </div>
                      </template>
                      <template x-if="!dispositionGrid">
                        <!-- <p class="muted">Define filas y columnas en el sector para ver aquí su disposición visual.</p> -->
                        <div x-data="{ src: './img/sector/' + current.plano_img }">
                          <h4 class="subsection-title">Disposición</h4>
                          <img x-bind:src="src" style="max-height: 300px;">
                        </div>
                      </template>

                      <hr class="section-divider">

                      <!-- ---------- Nichos del sector ---------- -->
                      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.7em;">
                        <h4 class="subsection-title" style="margin:0;">
                          Nichos (<span x-text="nichosForCurrent.length"></span>)
                        </h4>
                        <div style="display:flex; gap:0.5em;" x-show="canWrite">
                          <button class="btn btn-ghost btn-sm" x-show="nichosForCurrent.length === 0" :disabled="generating" @click="generarNichos()">
                            <span x-show="!generating">Generar automáticamente</span>
                            <span x-show="generating">Generando…</span>
                          </button>
                          <template x-if="current.filas * current.columnas != nichosForCurrent.length">
                            <button class="btn btn-primary btn-sm" @click="openNichoCreate()">+ Nicho</button>
                          </template>
                        </div>

                        <div class="def-item"><div class="dt">Referencia</div><div class="dd" x-text="current.referencia || '—'"></div></div>
                        <div class="def-item"><div class="dt">Importe</div><div class="dd" x-text="fmtImporte(current.importe)"></div></div>
                        <div class="def-item"><div class="dt">Fecha de pago</div><div class="dd" x-text="fmtDate(current.fecha_pago)"></div></div>
                        <div class="def-item">
                          <div class="dt">Estado</div>
                          <div class="dd">
                            <span class="tag" :class="{
                              'tag-ocupado': current.estado === 'Anulado',
                              'tag-vacio': current.estado === 'Pagado',
                              'tag-reservado': current.estado === 'Pendiente'
                            }" x-text="current.estado"></span>
                          </div>
                        </div>
                      </div>
                      <div class="def-list full">
                        <div class="def-item"><div class="dt">Observaciones</div><div class="dd" x-text="current.observaciones || '—'"></div></div>
                      </div>
                      <hr class="miniform-divider">
                    </div>
                  </template>

                  <!-- ---------- MODO CREAR / EDITAR ---------- -->
                  <template x-if="drawerMode === 'create' || drawerMode === 'edit'">
                    <div class="form-grid">
                      <div class="field">
                        <label>Sector *</label>
                        <select x-model="formSectorId" @change="onSectorChangeInForm()">
                          <option value="">— Elegir sector —</option>
                          <template x-for="s in sectores" :key="s.id">
                            <option :value="s.id" :selected="s.id === formSectorId" x-text="s.nombre"></option>
                          </template>
                        </select>
                      </div>

                      <div class="field">
                        <label>Nicho *</label>
                        <select x-model="form.nicho_id" :disabled="!formSectorId">
                          <option value="">— Elegir nicho —</option>
                          <template x-for="n in nichoOptions" :key="n.id">
                            <option :value="n.id" :selected="n.id === form.nicho_id" x-text="'Nº ' + n.numero_nicho + (n.estado ? ' · ' + n.estado : '')"></option>
                          </template>
                        </select>
                      </div>

                      <div class="field span-2" style="position:relative;">
                        <label>Propietario/Familiar (opcional)</label>
                        <input type="text" placeholder="Busca por nombre, apellidos o DNI…"
                               x-model="propSearch" @input="onPropSearchInput()">
                        <div class="autocomplete-results" x-show="propResults.length > 0">
                          <template x-for="p in propResults" :key="p.id">
                            <button type="button" @click="pickPropietario(p)" x-text="p.nombre + ' ' + (p.apellidos || '') + (p.dni ? ' (' + p.dni + ')' : '')"></button>
                          </template>
                        </div>
                        <button type="button" class="btn btn-ghost btn-sm" style="margin-top:0.5em;" x-show="propSelected" @click="clearPropietario()">Quitar propietario</button>
                      </div>

                      <div class="field"><label>Mutua</label><input type="text" x-model="form.mutua"></div>
                      <div class="field"><label>Entidad</label><input type="text" x-model="form.entidad"></div>

                      <div class="field"><label>Fecha documento</label><input type="date" x-model="form.fecha"></div>
                      <div class="field"><label>Nº documento</label><input type="text" x-model="form.docnum"></div>

                      <div class="field"><label>Expediente</label><input type="text" x-model="form.expediente"></div>
                      <div class="field"><label>Referencia</label><input type="text" x-model="form.referencia"></div>

                      <div class="field"><label>Importe (€)</label><input type="number" min="0" step="0.01" x-model="form.importe"></div>
                      <div class="field"><label>Fecha de pago</label><input type="date" x-model="form.fecha_pago"></div>

                      <div class="field">
                        <label>Estado</label>
                        <select x-model="form.estado">
                          <option value="Pendiente">Pendiente</option>
                          <option value="Pagado">Pagado</option>
                          <option value="Anulado">Anulado</option>
                        </select>
                      </div>

                      <div class="field span-2"><label>Observaciones</label><textarea x-model="form.observaciones"></textarea></div>
                    </div>
                  </template>

                </div>

                <div class="drawer-footer">
                  <template x-if="drawerMode === 'view'">
                    <template x-if="canWrite">
                      <button class="btn btn-danger" @click="deleteCurrent()">Eliminar</button>
                    </template>
                  </template>
                  <div class="spacer"></div>
                  <template x-if="drawerMode === 'view'">
                    <button class="btn btn-ghost" @click="closeDrawer()">Cerrar</button>
                  </template>
                  <template x-if="drawerMode === 'view' && canWrite">
                    <button class="btn btn-primary" @click="startEdit()">Editar</button>
                  </template>
                  <template x-if="drawerMode === 'create' || drawerMode === 'edit'">
                    <button class="btn btn-ghost" @click="cancelEdit()">Cancelar</button>
                  </template>
                  <template x-if="drawerMode === 'create' || drawerMode === 'edit'">
                    <button class="btn btn-primary" :disabled="saving" @click="saveForm()">
                      <span x-show="!saving">Guardar</span>
                      <span x-show="saving">Guardando…</span>
                    </button>
                  </template>
                </div>

              </div>
            </div>
          </template>

        </div>
      </template>

      <!-- ---------- Usuarios (solo admin) ---------- -->
      <template x-if="activeSection === 'usuarios'">
        <div x-data="usuariosSection()" x-init="init()">

          <template x-if="!isAdmin">
            <div class="panel placeholder-panel">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/>
              </svg>
              <h3>Acceso restringido</h3>
              <p>Esta sección es solo para administradores.</p>
            </div>
          </template>

          <template x-if="isAdmin">
            <div>
              <div class="panel" style="margin-bottom:1.4em;">
                <p style="margin:0; color:var(--color-ink-soft); font-size:0.9rem;">
                  Los usuarios nuevos se dan de alta desde el panel de Supabase
                  (<strong>Authentication → Users → Add user</strong>). En cuanto
                  se crean, aparecen aquí automáticamente con rol <strong>Consulta</strong>
                  por defecto, listos para que les asignes el rol correcto.
                </p>
              </div>

              <div class="toolbar">
                <input class="search-input" type="text" placeholder="Buscar por correo o nombre…" x-model="search">
              </div>

              <table class="data-table">
                <thead>
                  <tr>
                    <th>Correo</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Alta</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-if="loading">
                    <tr><td colspan="4" class="table-empty">Cargando…</td></tr>
                  </template>
                  <template x-if="!loading && filteredRows.length === 0">
                    <tr><td colspan="4" class="table-empty">No se han encontrado usuarios.</td></tr>
                  </template>
                  <template x-if="!loading">
                    <template x-for="row in filteredRows" :key="row.id">
                      <tr @click="openEdit(row)">
                        <td x-text="row.email"></td>
                        <td x-text="row.nombre || '—'"></td>
                        <td>
                          <span class="tag" :class="{
                            'tag-ocupado': row.role === 'admin',
                            'tag-reservado': row.role === 'avanzado',
                            'tag-vacio': row.role === 'consulta'
                          }" x-text="roleLabel(row.role)"></span>
                          <span class="muted" x-show="row.id === myId" style="font-size:0.78rem;"> (tú)</span>
                        </td>
                        <td x-text="fmtDate(row.created_at)"></td>
                      </tr>
                    </template>
                  </template>
                </tbody>
              </table>

              <!-- ===================== DRAWER DE EDICIÓN ===================== -->
              <template x-if="drawerOpen">
                <div>
                  <div class="drawer-backdrop" @click="closeDrawer()"></div>
                  <div class="drawer">

                    <div class="drawer-header">
                      <div>
                        <h3 x-text="current?.email"></h3>
                        <div class="muted">Editando usuario</div>
                      </div>
                      <button class="drawer-close" @click="closeDrawer()" aria-label="Cerrar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                      </button>
                    </div>

                    <div class="drawer-body">
                      <template x-if="formError">
                        <div class="error-banner" x-text="formError"></div>
                      </template>

                      <div class="field"><label>Nombre</label><input type="text" x-model="form.nombre" placeholder="(sin especificar)"></div>

                      <div class="field">
                        <label>Rol</label>
                        <select x-model="form.role">
                          <option value="consulta">Consulta — solo lectura</option>
                          <option value="avanzado">Avanzado — edita todo salvo usuarios y alta/baja de sectores</option>
                          <option value="admin">Administrador — acceso total</option>
                        </select>
                      </div>
                    </div>

                    <div class="drawer-footer">
                      <div class="spacer"></div>
                      <button class="btn btn-ghost" @click="closeDrawer()">Cancelar</button>
                      <button class="btn btn-primary" :disabled="saving" @click="saveForm()">
                        <span x-show="!saving">Guardar</span>
                        <span x-show="saving">Guardando…</span>
                      </button>
                    </div>

                  </div>
                </div>
              </template>

            </div>
          </template>

        </div>
      </template>

      <!-- ---------- Secciones aún no construidas ---------- -->
      <template x-if="activeSection !== 'dashboard' && activeSection !== 'difuntos' && activeSection !== 'sectores' && activeSection !== 'propietarios' && activeSection !== 'recibos' && activeSection !== 'usuarios'">
        <div class="panel placeholder-panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 4.5v9L12 20l-8-4.5v-9z"/>
            <path d="M12 12v8M12 12l8-4.5M12 12L4 7.5"/>
          </svg>
          <h3 x-text="sectionTitle"></h3>
          <p>Esta sección está pendiente de construir.</p>
        </div>
      </template>

    </main>
  </div>
</div>

</body>
</html>
